services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-gateway}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-api_gateway}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gateway} -d ${DB_NAME:-api_gateway}"]
      interval: 10s
      retries: 5
    # 不暴露到宿主机，只在内部网络通信

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-gateway}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-api_gateway}
      DATABASE_URL_SYNC: postgresql://${DB_USER:-gateway}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-api_gateway}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DEBUG: "false"
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
      API_KEY_PREFIX: sk-
      DEFAULT_RATE_LIMIT_RPM: 60
      MARKUP_RATIO: 1.5
      STREAM_READ_TIMEOUT: 60
      CORS_ORIGINS: '["https://${DOMAIN}","https://api.${DOMAIN}"]'
      WX_APPID: ${WX_APPID:-}
      WX_SECRET: ${WX_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_var:/var/lib/letsencrypt:ro
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 6h & wait $${!}; certbot renew --webroot -w /var/www/certbot --quiet; done'"

volumes:
  pgdata:
  redisdata:
  certbot_www:
  certbot_conf:
  certbot_var:
