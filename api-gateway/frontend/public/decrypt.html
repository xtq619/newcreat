<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密文解密工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0a; color: #e0e0e0;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .container {
    width: 100%; max-width: 640px;
    background: #141414; border: 1px solid #2a2a2a; border-radius: 12px;
    padding: 40px;
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: #fff; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }
  label {
    display: block; font-size: 11px; font-family: monospace;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: #666; margin-bottom: 8px;
  }
  textarea, input[type="password"] {
    width: 100%; padding: 12px; background: #0a0a0a;
    border: 1px solid #2a2a2a; color: #e0e0e0; font-size: 13px;
    font-family: monospace; border-radius: 6px; outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus, input[type="password"]:focus { border-color: #555; }
  textarea { resize: vertical; min-height: 120px; }
  .field { margin-bottom: 20px; }
  button {
    width: 100%; padding: 12px; background: #fff; color: #000;
    border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
    font-family: monospace; letter-spacing: 0.05em;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }
  .result {
    margin-top: 24px; padding: 20px; background: #0a0a0a;
    border: 1px solid #2a2a2a; border-radius: 6px;
    white-space: pre-wrap; word-break: break-word;
    font-size: 14px; line-height: 1.8; color: #e0e0e0;
    display: none;
  }
  .error {
    margin-top: 16px; padding: 12px; background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3); border-radius: 6px;
    font-size: 12px; color: #ef4444; display: none;
  }
  .copy-btn {
    width: auto; padding: 6px 16px; margin-top: 12px;
    background: transparent; color: #888; border: 1px solid #2a2a2a;
    font-size: 11px;
  }
  .copy-btn:hover { color: #fff; border-color: #555; }
</style>
</head>
<body>
<div class="container">
  <h1>密文解密工具</h1>
  <p class="subtitle">全程本地解密，不经过任何服务器</p>

  <div class="field">
    <label>密文（Base64）</label>
    <textarea id="ciphertext" placeholder="粘贴密文..."></textarea>
  </div>

  <div class="field">
    <label>解密密码</label>
    <input type="password" id="password" placeholder="输入解密密码">
  </div>

  <button id="decryptBtn" onclick="decrypt()">解密</button>

  <div class="error" id="error"></div>
  <div class="result" id="result">
    <div id="resultText"></div>
    <button class="copy-btn" onclick="copyResult()">复制原文</button>
  </div>
</div>

<script>
async function decrypt() {
  const b64 = document.getElementById('ciphertext').value.trim();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('error');
  const resultEl = document.getElementById('result');
  const resultText = document.getElementById('resultText');

  errorEl.style.display = 'none';
  resultEl.style.display = 'none';

  if (!b64 || !password) {
    showError('请输入密文和密码');
    return;
  }

  try {
    const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));

    if (raw.length < 45) { // 16 salt + 12 iv + 1 tag(16) minimum
      showError('密文格式无效');
      return;
    }

    const salt = raw.slice(0, 16);
    const iv = raw.slice(16, 28);
    const ctWithTag = raw.slice(28);

    // Derive key: PBKDF2-SHA256, 100000 iterations
    const passKey = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
    );
    const aesKey = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      passKey,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );

    const plainBuf = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv },
      aesKey,
      ctWithTag
    );

    const text = new TextDecoder().decode(plainBuf);
    resultText.textContent = text;
    resultEl.style.display = 'block';
  } catch (e) {
    showError('解密失败：密码错误或密文损坏');
  }
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

function copyResult() {
  const text = document.getElementById('resultText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = '复制原文', 1500);
  });
}

// Allow Ctrl+Enter to decrypt
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') decrypt();
});
</script>
</body>
</html>
